<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>My Library</title>
		<link rel="stylesheet" href="style.css">
		<script src="script.js" defer></script>
	</head>
	<body>
		<h1>My Library</h1>
		<table>
			<thead>
				<tr>
					<th scope="col">Title</th>
					<th scope="col">Author</th>
					<th scope="col">Page Count</th>
					<th scope="col">Been read</th>
					<th scope="col">Actions</th>
				</tr>
			</thead>
			<tbody>
			</tbody>
		</table>

		<div class="submit">
		</div>

		<button command="show-modal" commandfor="book-form">Add Book</button>
		<dialog id="book-form" popover closedby="any">
			<form>
				<label for="title">Title</label>
				<input id="title" name="title" type="text" minlength="1" />
	
				<label for="author">Author</label>
				<input id="author" name="author" type="text" minlength="1" />
	
				<label for="pages">Page Count</label>
				<input id="pages" name="pages" type="number" min="1" value="1" />
	
				<label for="readStatus">Status</label>
				<select id="readStatus" name="readStatus">
					<option value="0">Planned</option>
					<option value="1">Reading</option>
					<option value="2">Competed</option>
				</option>
	
				<input type="submit" value="Append to list" />
			</form>
		</dialog>
	</body>
</html>
