<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>HTML Boilerplate</title>
		<link rel="stylesheet" href="style.css">
		<script src="script.js" defer></script>
	</head>
	<body>
		<h1>My Library</h1>
		<table>
			<thead>
				<tr>
					<th scope="col">Title</th>
					<th scope="col">Author</th>
					<th scope="col">Page Count</th>
					<th scope="col">Been read</th>
					<th scope="col">Delete entry</th>
				</tr>
			</thead>
			<tbody>
			</tbody>
		</table>

		<div class="submit">
		</div>

		<button command="show-modal" commandfor="edit-book">Add Book</button>
		<dialog id="edit-book" popover closedby="any">
			<form id="addBook">
				<label for="title">Title</label>
				<input id="title" name="title" type="text" minlength="1" />
	
				<label for="author">Author</label>
				<input id="author" name="author" type="text" minlength="1" />
	
				<label for="pages">Page Count</label>
				<input id="pages" name="pages" type="number" min="1" value="1" />
	
				<label for="read">Read</label>
				<input id="read" name="read" type="checkbox" />
	
				<input type="submit" value="Append to list" />
				<!-- <button>Cancel</button> -->
			</form>
		</dialog>
	</body>
</html>
